<body class="lang-en chinese-mode">
    <nav style="position: fixed; top: 0; right: 0; padding: 20px; z-index: 1000;">
        <button id="lang-toggle-btn" class="lang-btn">English</button>
    </nav>

    <main class="container">
        <div class="content fade-in-up">
            <p style="font-size: 6rem; font-weight: 700; color: var(--accent-color); line-height: 1; margin-bottom: 1.5rem; opacity: 0.25;">
                404
            </p>
            <h1 style="font-size: 2.5rem; text-transform: none; letter-spacing: -0.01em; margin-bottom: 1rem;">
                <span class="en">This page doesn't exist.</span>
                <span class="zh">這頁不存在。</span>
            </h1>
            <p class="subtitle" style="margin-bottom: 2.5rem;">
                <span class="en">But your idea does. Let's talk.</span>
                <span class="zh">但你的想法存在。來聊聊。</span>
            </p>
            <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">

                <a href="diagnostic.html" class="btn" style="background: transparent; border: 1.5px solid var(--accent-color); color: var(--accent-color); box-shadow: none;">
                    <span class="en">Map My Idea</span>
                    <span class="zh">釐清我的想法</span>
                </a>
            </div>
        </div>
    </main>

    <script>
        const langBtn = document.getElementById('lang-toggle-btn');
        const body = document.body;
        langBtn.addEventListener('click', () => {
            body.classList.toggle('chinese-mode');
            langBtn.textContent = body.classList.contains('chinese-mode') ? 'English' : '中文';
