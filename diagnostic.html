    <style>
        :root {
            --bg:     #f7f5f2;
            --text:   #1e1e1e;
            --text2:  #666666;
            --accent: #e85d00;
            --card:   #ffffff;
            --border: rgba(0,0,0,0.08);
            --font:   'Outfit', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }

        /* bilingual */
        body.chinese-mode .en { display:none; }
        body:not(.chinese-mode) .zh { display:none; }

        /* nav */
        nav { position:fixed; top:0; right:0; padding:20px; z-index:1000; display:flex; gap:1rem; align-items:center; }
        .nav-home { color:var(--text2); text-decoration:none; font-size:.9rem; transition:color .3s; }
        .nav-home:hover { color:var(--accent); }
        .lang-btn {
            background:transparent; border:1.5px solid var(--accent); color:var(--accent);
            padding:.4rem 1.2rem; border-radius:30px; font-family:var(--font); font-size:.9rem;
            cursor:pointer; transition:all .3s;
        }
        .lang-btn:hover { background:var(--accent); color:#fff; }

        /* page layout */
        .page-wrap {
            min-height:100vh; display:flex; flex-direction:column;
            align-items:center; justify-content:flex-start; padding:6rem 1.5rem 3rem;
        }
        .diag-card {
            background:var(--card); border-radius:16px;
            border:.5px solid var(--border); box-shadow:0 4px 24px rgba(0,0,0,.07);
            max-width:680px; width:100%; padding:2.5rem 3rem;
        }
        .diag-card.wide { max-width:860px; }
        .landing-card { margin-top:0; }
        .wizard-card { min-height:520px; }
        .result-card { margin-bottom:2rem; }

        /* landing */
        .land { text-align:center; padding:1rem 0; }
        .land-mark { width:54px; height:54px; border-radius:50%; background:#fff3ec; margin:0 auto 1.5rem;
            display:flex; align-items:center; justify-content:center; }
        .land-mark span { width:16px; height:16px; border-radius:50%; background:var(--accent); }
        .land-eyebrow { font-size:.78rem; letter-spacing:.18em; text-transform:uppercase; color:var(--text2); margin-bottom:1rem; }
        .land h1 { font-size:1.9rem; font-weight:700; line-height:1.4; margin-bottom:1.75rem; }

        /* progress */
        .prog-wrap { margin-bottom:2rem; }
        .prog-label { font-size:.78rem; color:var(--text2); margin-bottom:.6rem; text-transform:uppercase; letter-spacing:.05em; }
        .prog-track { height:4px; background:var(--border); border-radius:4px; overflow:hidden; }
        .prog-fill { height:100%; background:var(--accent); border-radius:4px; transition:width .5s cubic-bezier(.25,.8,.25,1); }
        .prog-dots { display:flex; gap:.5rem; margin-top:.75rem; }
        .dot { width:8px; height:8px; border-radius:50%; background:var(--border); transition:background .3s; }
        .dot.active { background:var(--accent); }
        .dot.done   { background:rgba(232,93,0,.35); }

        .screen { animation:slideUp .4s ease forwards; }
        @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

        /* question */
        .q-num  { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--accent); margin-bottom:.75rem; }
        .q-title { font-size:1.45rem; font-weight:700; line-height:1.4; margin-bottom:.5rem; }
        .q-hint  { font-size:.9rem; color:var(--text2); margin-bottom:1.75rem; }

        /* options */
        .options { display:flex; flex-direction:column; gap:.75rem; margin-bottom:.5rem; }
        .opt {
            display:flex; align-items:flex-start; gap:.85rem;
            background:var(--bg); border:1.5px solid var(--border); border-radius:10px;
            padding:1rem 1.25rem; text-align:left; font-family:var(--font); font-size:1rem;
            color:var(--text); cursor:pointer; transition:all .2s; line-height:1.5; width:100%;
        }
        .opt:hover { border-color:var(--accent); background:#fff8f4; }
        .opt-dot { width:16px; height:16px; flex:none; margin-top:.2rem; border:1.5px solid #c4c4c0;
            background:transparent; transition:all .15s; }
        .opt-dot.round { border-radius:50%; }
        .opt-dot.square { border-radius:5px; }
        .opt.selected { border-color:var(--accent); background:#fff3ec; }
        .opt.selected .opt-dot { background:var(--accent); border-color:var(--accent); box-shadow:inset 0 0 0 2.5px #fff3ec; }
        .opt-main { font-weight:500; }
        .opt.selected .opt-main { font-weight:700; }
        .opt-sub { display:block; font-size:.82rem; color:var(--text2); margin-top:.15rem; font-weight:400; }

        /* primary picker */
        .primary-wrap { margin-top:1.25rem; padding-top:1.1rem; border-top:1px dashed var(--border); }
        .primary-label { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--accent); margin-bottom:.65rem; }
        .primary-chips { display:flex; gap:.6rem; flex-wrap:wrap; }
        .chip { padding:.5rem 1.1rem; border-radius:30px; border:1.5px solid var(--border); background:#fff;
            color:var(--text2); font-family:var(--font); font-size:.9rem; cursor:pointer; transition:all .2s; }
        .chip.on { border-color:var(--accent); background:#fff3ec; color:var(--accent); font-weight:700; }

        /* next button */
        .next-btn {
            margin-top:1.75rem; background:var(--accent); color:#fff; border:none;
            padding:.875rem 2.5rem; font-size:1rem; font-weight:700; border-radius:50px;
            cursor:pointer; font-family:var(--font); box-shadow:0 4px 15px rgba(232,93,0,.2);
            transition:all .3s;
        }
        .next-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(232,93,0,.35); }
        .next-btn.is-hidden, .primary-wrap.is-hidden, .q4-hint.is-hidden { display:none; }

        .q4-hint { margin-top:1rem; padding:.85rem 1.1rem; border-radius:10px; background:#fff3ec;
            font-size:.88rem; color:#9a4a00; line-height:1.7; }
        .upload-zone {
            margin-top:1rem; border:1.5px dashed rgba(232,93,0,.35); border-radius:14px;
            background:#fff8f4; padding:1rem; cursor:pointer; transition:all .2s;
        }
        .upload-zone:hover, .upload-zone.dragging { border-color:var(--accent); background:#fff3ec; }
        .upload-title { font-size:.95rem; font-weight:700; margin-bottom:.25rem; }
        .upload-note { font-size:.82rem; color:var(--text2); line-height:1.6; }
        .upload-input { display:none; }
        .image-preview { display:grid; grid-template-columns:repeat(auto-fill,minmax(86px,1fr)); gap:.65rem; margin-top:.85rem; }
        .image-item { position:relative; border:1px solid var(--border); border-radius:10px; overflow:hidden; background:#fff; aspect-ratio:1; }
        .image-item img { width:100%; height:100%; object-fit:cover; display:block; }
        .image-remove {
            position:absolute; top:5px; right:5px; width:24px; height:24px; border:none; border-radius:50%;
            background:rgba(30,30,30,.78); color:#fff; font-size:16px; line-height:24px; cursor:pointer;
        }

        .back-link { background:none; border:none; color:var(--text2); font-family:var(--font); font-size:.9rem;
            cursor:pointer; padding:.3rem 0; margin-bottom:1.25rem; transition:color .2s; }
        .back-link:hover { color:var(--accent); }

        /* ── result: project map ── */
        .map-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:.4rem; }
        .map-eyebrow { font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--text2); }
        .map-ref { font-size:.72rem; letter-spacing:.05em; color:#b0a99f; }
        .map-title { font-size:1.7rem; font-weight:700; line-height:1.3; margin-bottom:1.25rem; }

        .strip { display:grid; grid-template-columns:1.3fr 1fr 1fr; gap:1px; background:var(--border);
            border-radius:14px; overflow:hidden; margin-bottom:1rem; }
        .strip-cell { background:#fff; padding:.9rem 1.1rem; }
        .strip-k { font-size:.72rem; color:var(--text2); margin-bottom:.3rem; }
        .strip-v { font-size:.98rem; font-weight:700; }

        .map-oneliner { font-size:.97rem; color:var(--text2); line-height:1.85; margin-bottom:1.5rem; }
        .path-label { font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--text2); margin:0 0 1rem .15rem; }

        .station-scroll { overflow-x:auto; padding:.25rem .15rem .4rem; margin:0 -.15rem; }
        .station-row { display:flex; min-width:max-content; }
        .station { flex:1 0 150px; min-width:150px; display:flex; flex-direction:column; }
        .station-top { display:flex; align-items:center; margin-bottom:.8rem; }
        .seg { flex:1; height:3px; }
        .seg.solid { background:var(--accent); border-radius:2px; }
        .seg.dash  { background:repeating-linear-gradient(to right,#dcd6cf 0,#dcd6cf 5px,transparent 5px,transparent 11px); }
        .seg.empty { background:transparent; }
        .badge { width:30px; height:30px; border-radius:50%; flex:none; margin:0 8px; display:flex;
            align-items:center; justify-content:center; font-size:.82rem; font-weight:700; box-sizing:border-box; }
        .badge.current  { background:#fff; border:3px solid var(--accent); color:var(--accent); box-shadow:0 0 0 5px #fff3ec; }
        .badge.done     { background:var(--accent); color:#fff; }
        .badge.upcoming { background:#fff; border:2px solid #ddd; color:#bbb; }
        .scard { border:1px solid var(--border); border-radius:12px; padding:.8rem .7rem .85rem; margin:0 6px;
            text-align:center; min-height:92px; display:flex; flex-direction:column; align-items:center; gap:.3rem; background:#fff; }
        .scard.current { border:2px solid rgba(232,93,0,.4); background:#fff8f4; box-shadow:0 12px 28px -18px rgba(232,93,0,.5); }
        .scard.done    { border:1px solid #f0d9c9; background:#fdf7f3; }
        .scard-code { font-size:.66rem; letter-spacing:.06em; color:var(--text2); }
        .scard-name { font-size:.86rem; font-weight:700; line-height:1.4; }
        .scard.upcoming .scard-name { color:#a8a8a4; font-weight:400; }
        .scard-tag { font-size:.66rem; padding:.12rem .55rem; border-radius:20px; white-space:nowrap; }
        .scard-tag.here { background:#fff3ec; color:var(--accent); font-weight:700; }
        .scard-tag.cleared { background:#eef0ee; color:#7a8a82; }

        .detail { margin-top:1.25rem; background:#fff; border:1px solid var(--border); border-radius:16px; padding:1.5rem; }
        .detail-code { display:flex; align-items:center; gap:.6rem; margin-bottom:.4rem; }
        .detail-code .c { font-size:.72rem; color:var(--text2); }
        .detail-code .here { font-size:.7rem; padding:.12rem .55rem; border-radius:20px; background:#fff3ec; color:var(--accent); font-weight:700; }
        .detail-name { font-size:1.2rem; font-weight:700; margin-bottom:1.1rem; }
        .detail-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:.75rem; align-items:start; }
        .box { border-radius:12px; padding:1rem 1.1rem; }
        .box.stuck { background:#fff8f4; border:1px solid rgba(232,93,0,.2); }
        .box.gap   { background:var(--bg); border:1px solid var(--border); }
        .box-k { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; margin-bottom:.5rem; }
        .box.stuck .box-k { color:var(--accent); }
        .box.gap .box-k { color:var(--text2); }
        .box-v { font-size:.9rem; line-height:1.8; color:var(--text); }
        .help { margin-top:.75rem; background:#fff3ec; border-radius:12px; padding:1.25rem; }
        .help-k { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--accent); margin-bottom:.5rem; }
        .help-v { font-size:.95rem; line-height:1.8; color:var(--text); margin-bottom:1rem; }

        .r-divider { height:1px; background:var(--border); margin:1.5rem 0; }
        .r-disclaimer { font-size:.87rem; color:var(--text2); font-style:italic; margin-bottom:1.5rem; }
        .r-cta { display:flex; flex-wrap:wrap; gap:.75rem; align-items:center; }
        .btn-main { display:inline-block; background:var(--accent); color:#fff; text-decoration:none;
            padding:.875rem 2rem; font-size:1rem; font-weight:700; border-radius:50px;
            box-shadow:0 4px 15px rgba(232,93,0,.2); transition:all .3s; cursor:pointer; border:none; font-family:var(--font); }
        .btn-main:disabled { opacity:.55; cursor:not-allowed; transform:none; box-shadow:none; }
        .btn-main:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(232,93,0,.35); }
        .btn-sec { display:inline-block; border:1.5px solid var(--border); color:var(--text);
            text-decoration:none; padding:.875rem 1.75rem; font-size:.95rem; border-radius:50px; transition:all .3s; }
        .btn-sec:hover { border-color:var(--accent); color:var(--accent); }
        .btn-restart { background:none; border:none; color:var(--text2); font-family:var(--font);
            font-size:.9rem; cursor:pointer; text-decoration:underline; text-underline-offset:3px; padding:.5rem 0; transition:color .2s; }
        .btn-restart:hover { color:var(--accent); }
        .submit-panel { margin-top:1.25rem; background:#fff; border:1px solid var(--border); border-radius:16px; padding:1.25rem; }
        .submit-title { font-size:1.05rem; font-weight:700; margin-bottom:.35rem; }
        .submit-note { font-size:.86rem; color:var(--text2); line-height:1.7; margin-bottom:1rem; }
        .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:.75rem; margin-bottom:.75rem; }
        .field { display:flex; flex-direction:column; gap:.35rem; }
        .field label { font-size:.76rem; font-weight:700; color:var(--text2); }
        .field input, .field textarea {
            width:100%; border:1px solid var(--border); border-radius:10px; padding:.75rem .85rem;
            font-family:var(--font); font-size:.92rem; color:var(--text); background:var(--bg);
        }
        .field textarea { min-height:84px; resize:vertical; }
        .submit-status { min-height:1.4rem; margin-top:.75rem; font-size:.86rem; line-height:1.6; color:var(--text2); }
        .submit-status.ok { color:#2d7a4f; }
        .submit-status.err { color:#cc4125; }

        @media (max-width:600px) {
            .diag-card { padding:2rem 1.5rem; }
            .map-title { font-size:1.4rem; }
            .q-title { font-size:1.3rem; }
            .strip { grid-template-columns:1fr; }
            .r-cta { flex-direction:column; align-items:flex-start; }
        }
    </style>
</head>

/* 建議資料 */
var REC = [
  {zh:'產品整體照片', en:'Overall product photo'},
  {zh:'問題位置近照', en:'Close-up of the problem area'},
  {zh:'使用 / 裝配狀態照片', en:'Photo of use / assembly state'},
  {zh:'主要尺寸', en:'Key dimensions'},
  {zh:'材料資訊', en:'Material info'}
];
var GAP_OK = {zh:'資料大致齊全，可以往下一站推進。', en:'Your data is fairly complete — you can move to the next station.'};

/* 幫助 + CTA（依分數） */

  if(s<=30) return { help:{zh:'先用一次線上初診釐清方向、列出要補的資料，再決定要不要投入後續。', en:'Start with an online consult to clarify direction and list the data to gather, then decide whether to invest further.'}, cta:{zh:'預約線上初診', en:'Book an online consult'} };
  if(s<=60) return { help:{zh:'資料可以做初步判斷。用一次 60 分鐘線上初診，確認問題並規劃下一步。', en:'Your data allows an initial read. A 60-min online consult can confirm the problem and plan next steps.'}, cta:{zh:'預約 60 分鐘線上初診', en:'Book a 60-min consult'} };
  if(s<=80) return { help:{zh:'資料足夠做標準健檢，我們會給你風險摘要與完整 Roadmap。', en:'Enough data for a standard health check — you will get a risk summary and full roadmap.'}, cta:{zh:'申請標準健檢報告', en:'Request a health-check report'} };
  return { help:{zh:'資料完整，可直接進入 DFM / CAE / CFD 深度工程審查。', en:'Your data is complete — ready for a deep DFM / CAE / CFD engineering review.'}, cta:{zh:'詢問深度工程審查', en:'Ask about a deep engineering review'} };
}

/* =========================================================================
   狀態
   ========================================================================= */
var state = { view:'landing', step:0,
  answers:{ intent:null, sub:null, focus:[], focusPrimary:null, data:[], images:[] } };

function flow(){
  var f = ['intent'];
  if(state.answers.intent!=null){
    if(state.answers.intent!==3) f.push('sub');
    f.push('focus','data');
  }
  return f;
}
function resetAnswers(){ return { intent:null, sub:null, focus:[], focusPrimary:null, data:[], images:[] }; }

/* =========================================================================
   操作
   ========================================================================= */
var _t = null;
function onStart(){ state.view='wizard'; state.step=0; state.answers=resetAnswers(); render(); }
function selectIntent(i){ state.answers.intent=i; state.answers.sub=null; refreshWizardSelection(); clearTimeout(_t); _t=setTimeout(advance,260); }
function selectSub(i){ state.answers.sub=i; refreshWizardSelection(); clearTimeout(_t); _t=setTimeout(advance,260); }
function toggleFocus(i){
  var arr=state.answers.focus.slice(); var none=10; var next;
  if(i===none){ next = arr.indexOf(none)>-1?[]:[none]; }
  else{
    next=arr.filter(function(x){return x!==none;});
    if(next.indexOf(i)>-1) next=next.filter(function(x){return x!==i;});
    else if(next.length>=2) next=next.slice(1).concat(i);   // 已 2 項 → 換掉較早的
    else next=next.concat(i);
  }
  state.answers.focus=next;
  var fp=state.answers.focusPrimary;
  state.answers.focusPrimary = next.length===0?null:(next.indexOf(fp)>-1?fp:next[0]);
  refreshWizardSelection();
}
function setPrimary(i){ state.answers.focusPrimary=i; refreshWizardSelection(); }
function toggleData(i){
  var arr=state.answers.data.slice(); var none=12; var next;
  if(i===none){ next = arr.indexOf(none)>-1?[]:[none]; }
  else{ next=arr.filter(function(x){return x!==none;}); next = next.indexOf(i)>-1?next.filter(function(x){return x!==i;}):next.concat(i); }
  state.answers.data=next; refreshWizardSelection();
}
function handleImageFiles(fileList){
  var files=Array.prototype.slice.call(fileList||[]).filter(function(file){ return file.type && file.type.indexOf('image/')===0; });
  if(files.length===0) return;
  var slots=Math.max(0,6-state.answers.images.length);
  files.slice(0,slots).forEach(function(file){
    var reader=new FileReader();
    reader.onload=function(){
      state.answers.images.push({name:file.name||'pasted-image', type:file.type||'image/png', file:file, data:reader.result});
      markPhotoDataFromImages();
      refreshWizardSelection();
    };
    reader.readAsDataURL(file);
  });
}
function markPhotoDataFromImages(){
  if(state.answers.images.length===0) return;
  var preferred=state.answers.intent===2?1:0;
  var arr=state.answers.data.filter(function(i){return i!==12;});
  if(arr.indexOf(preferred)===-1) arr.push(preferred);
  if(state.answers.intent===2 && arr.indexOf(10)===-1) arr.push(10);
  state.answers.data=arr;
}
function removeImage(i){
  state.answers.images.splice(i,1);
  refreshWizardSelection();
}
function onUploadDrop(ev){
  ev.preventDefault();
  ev.currentTarget.classList.remove('dragging');
  handleImageFiles(ev.dataTransfer.files);
}
function onUploadPaste(ev){
  handleImageFiles(ev.clipboardData.files);
}
function escapeHTML(value){
  return String(value==null?'':value).replace(/[&<>"']/g,function(ch){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
  });
}
function supabaseHeaders(json){
  var h = { apikey:SUPABASE_KEY, Authorization:'Bearer '+SUPABASE_KEY };
  if(json) h['Content-Type']='application/json';
  return h;
}
function fileExt(name,type){
  var m=String(name||'').match(/\.([a-z0-9]+)$/i);
  if(m) return m[1].toLowerCase();
  if(type==='image/png') return 'png';
  if(type==='image/webp') return 'webp';
  return 'jpg';
}
function makeSubmissionId(){
  if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return String(Date.now())+'-'+Math.random().toString(16).slice(2);
}
async function uploadDiagnosticImages(submissionId){
  var paths=[];
  var imgs=state.answers.images||[];
  for(var i=0;i<imgs.length;i++){
    var img=imgs[i];
    if(!img.file) continue;
    var ext=fileExt(img.name,img.type);
    var path='public/'+submissionId+'/'+String(i+1)+'-'+Date.now()+'.'+ext;
    var res=await fetch(SUPABASE_URL+'/storage/v1/object/'+SUPABASE_BUCKET+'/'+path,{
      method:'POST',
      headers:{ apikey:SUPABASE_KEY, Authorization:'Bearer '+SUPABASE_KEY, 'Content-Type':img.type||'application/octet-stream', 'x-upsert':'false' },
      body:img.file
    });
    if(!res.ok){
      var msg=await res.text();
      throw new Error('Image upload failed: '+msg);
    }
    paths.push(path);
  }
  return paths;
}
function currentResultMeta(){
  var a=state.answers, score=readiness(), part=isPart(), rm=part?PART_RM:PRODUCT_RM, cur;
  if(part){ cur=partCurrentStation(score); }
  else{
    cur=(a.intent===0)?[1,2,3,4][a.sub!=null?a.sub:0]:0;
    if(score>80) cur=Math.min(cur+1,rm.length-1);
  }
  return {score:score, current_code:rm[cur][0], current_name:rm[cur][1], risk:riskInfo().zh};
}
async function submitDiagnostic(){
  var status=document.getElementById('submit-status');
  var btn=document.getElementById('submit-diagnostic-btn');
  var name=(document.getElementById('contact-name')||{}).value||'';
  var email=(document.getElementById('contact-email')||{}).value||'';
  var line=(document.getElementById('contact-line')||{}).value||'';
  var note=(document.getElementById('user-note')||{}).value||'';
  if(!email.trim() && !line.trim()){
    status.className='submit-status err';
    status.textContent='請至少留下 Email 或 LINE，否則我無法回覆你。';
    return;
  }
  btn.disabled=true;
  status.className='submit-status';
  status.textContent='正在上傳診斷資料...';
  try{
    var submissionId=makeSubmissionId();
    var imagePaths=await uploadDiagnosticImages(submissionId);
    var meta=currentResultMeta();
    var payload={
      id:submissionId,
      intent:state.answers.intent,
      sub:state.answers.sub,
      focus:state.answers.focus,
      focus_primary:state.answers.focusPrimary,
      data:state.answers.data,
      readiness:meta.score,
      image_paths:imagePaths,
      user_note:note,
      contact_name:name,
      contact_email:email,
      contact_line:line
    };
    var res=await fetch(SUPABASE_URL+'/rest/v1/'+SUPABASE_TABLE,{
      method:'POST',
      headers:Object.assign(supabaseHeaders(true),{Prefer:'return=minimal'}),
      body:JSON.stringify(payload)
    });
    if(!res.ok){
      var msg=await res.text();
      throw new Error('Database insert failed: '+msg);
    }
    status.className='submit-status ok';
    status.textContent='已送出，我會依你留下的聯絡方式回覆。';
    btn.textContent='已送出';
  }catch(err){
    status.className='submit-status err';
    status.textContent='送出失敗：請確認 Supabase table、bucket 和 RLS policy 已建立。';
    console.error(err);
    btn.disabled=false;
  }
}
function advance(){ if(state.step<flow().length-1){ state.step++; render(); } else { finish(); } }
function onContinue(){
  var key=flow()[state.step];
  if(key==='focus' && state.answers.focus.length===0) return;
  if(key==='data'  && state.answers.data.length===0 && state.answers.images.length===0) return;
  advance();
}
function onBack(){ if(state.step===0){ state.view='landing'; } else { state.step--; } render(); }
function finish(){
  state.view='results'; render();
  if(typeof gtag==='function'){
    gtag('event','diagnostic_complete',{ intent:state.answers.intent, focus:state.answers.focusPrimary, score:readiness() });
  }
}
function restart(){ state.view='landing'; state.step=0; state.answers=resetAnswers(); render(); }

function setHidden(el, hidden){
  if(el) el.classList.toggle('is-hidden', hidden);
}
function setOptionState(buttons, selectedFn){
  for(var i=0;i<buttons.length;i++){
    buttons[i].classList.toggle('selected', !!selectedFn(i));
  }
}
function primaryHTML(){
  var a=state.answers;
  if(a.focus.length!==2) return '';
  var chips='';
  for(var p=0;p<a.focus.length;p++){
    var fi=a.focus[p];
    chips+='<button class="chip'+(a.focusPrimary===fi?' on':'')+'" onclick="setPrimary('+fi+')">'+bi(FOCUS[fi].zh,FOCUS[fi].en)+'</button>';
  }
  return '<div class="primary-label">'+bi('主要項目','Which one matters most?')+'</div><div class="primary-chips">'+chips+'</div>';
}
function refreshWizardSelection(){
  if(state.view!=='wizard'){ render(); return; }
  var app=document.getElementById('app');
  if(!app){ return; }
  var key=flow()[state.step], a=state.answers;
  var buttons=app.querySelectorAll('.options .opt');
  if(key==='intent') setOptionState(buttons, function(i){ return a.intent===i; });
  else if(key==='sub') setOptionState(buttons, function(i){ return a.sub===i; });
  else if(key==='focus'){
    setOptionState(buttons, function(i){ return a.focus.indexOf(i)>-1; });
    var primary=document.getElementById('primary-wrap');
    if(primary){ primary.innerHTML=primaryHTML(); setHidden(primary, a.focus.length!==2); }
    setHidden(document.getElementById('focus-next'), a.focus.length===0);
  }
  else if(key==='data'){
    setOptionState(buttons, function(i){ return a.data.indexOf(i)>-1; });
    setHidden(document.getElementById('data-hint'), a.data.indexOf(12)===-1);
    setHidden(document.getElementById('data-next'), a.data.length===0);
    var preview=document.getElementById('image-preview');
    if(preview) preview.innerHTML=imagePreviewHTML();
  }
}

/* =========================================================================
   診斷邏輯
   ========================================================================= */
function isPart(){ var i=state.answers.intent; return i===1||i===2; }
function selectedData(){
  return (state.answers.data||[]).filter(function(i){return i!==12;});
}
function hasData(i){
  return selectedData().indexOf(i)>-1;
}
function hasImages(){
  return (state.answers.images||[]).length>0;
}
function hasPhotoEvidence(){
  return hasImages() || hasData(0) || hasData(1) || hasData(10);
}
function hasFocus(i){
  return (state.answers.focus||[]).indexOf(i)>-1 || state.answers.focusPrimary===i;
}
function readiness(){
  var p=selectedData();
  if(p.length===0 && !hasImages()) return 15;
  if(state.answers.intent===2){
    var sPart=20;
    if(hasData(10) || hasImages()) sPart+=20; // failure photos or uploaded evidence
    if(hasData(1))  sPart+=10; // part photos
    if(hasData(8))  sPart+=15; // process info
    if(hasData(7))  sPart+=15; // material info
    if(hasData(6))  sPart+=15; // key dimensions
    if(hasData(9))  sPart+=10; // usage scenario
    if(hasData(5))  sPart+=10; // video
    if(hasData(0))  sPart+=5;  // product photos
    return Math.round(Math.min(95,sPart)/5)*5;
  }
  var s=Math.min(95,22+p.length*10);
  return Math.round(s/5)*5;
}
function partCurrentStation(score){
  var a=state.answers, p=selectedData();
  var failureCase = a.intent===2 && (a.sub===0 || a.sub===2);
  if(!failureCase){
    return score<=30?0:score<=60?1:score<=80?2:3;
  }
  if(p.length===0 && !hasImages()) return 0;
  if((hasData(10) || hasImages()) && (hasData(8) || hasData(7) || hasData(6) || hasFocus(3) || hasFocus(2) || hasFocus(0))) return 2;
  if(hasPhotoEvidence() || hasData(5)) return 1;
  return score<=45?1:2;
}
function recommendedGaps(part){
  if(state.answers.intent===2){
    var items=[];
    if(!hasData(10) && !hasImages()) items.push({zh:'失效照片或裂紋 / 變形 / 磨耗近照', en:'Failure photos or close-ups of crack / deformation / wear'});
    if(!hasData(1) && !hasImages()) items.push({zh:'零件整體照片與問題位置近照', en:'Overall part photo and close-up of the problem area'});
    if(!hasData(8)) items.push({zh:'製程條件、批次、良率或失效發生時機', en:'Process conditions, batch, yield, or when the failure happens'});
    if(!hasData(7)) items.push({zh:'材料牌號、材質證明或供應商材料資訊', en:'Material grade, certificate, or supplier material info'});
    if(!hasData(6)) items.push({zh:'關鍵尺寸、配合尺寸或受力位置尺寸', en:'Key dimensions, fit dimensions, or loaded-area dimensions'});
    if(!hasData(9)) items.push({zh:'使用 / 裝配狀態與實際工況', en:'Use / assembly state and real operating condition'});
    return items.slice(0,3);
  }
  var prov=selectedData().map(function(i){return DATA[i].zh;});
  return REC.filter(function(r){
    if(r.zh.indexOf('尺寸')>-1) return !prov.some(function(p){return p.indexOf('尺寸')>-1;});
    if(r.zh.indexOf('材料')>-1) return !prov.some(function(p){return p.indexOf('材料')>-1;});
    return true;
  }).slice(0,3);
}
function tfPair(){ var fp=state.answers.focusPrimary; return (fp==null||fp===10)?null:FOCUS[fp]; }
function riskInfo(){ var fp=state.answers.focusPrimary; return (fp==null)?RISK[10]:RISK[fp]; }

   畫面 2：Wizard
   ========================================================================= */
function dotsHTML(){
  var f=flow(); var total = state.answers.intent==null?4:f.length; var h='';
  for(var i=0;i<total;i++){
    var cls='dot'; if(i<state.step) cls+=' done'; else if(i===state.step) cls+=' active';
    h+='<div class="'+cls+'"></div>';
  }
  return h;
}
function progHTML(){
  var f=flow(); var total = state.answers.intent==null?4:f.length;
  var pct = Math.round((state.step+1)/total*100);
  return '<div class="prog-wrap">' +
    '<div class="prog-label">'+bi('第 '+(state.step+1)+' 步，共 '+total+' 步','Step '+(state.step+1)+' of '+total)+'</div>' +
    '<div class="prog-track"><div class="prog-fill" style="width:'+pct+'%"></div></div>' +
    '<div class="prog-dots">'+dotsHTML()+'</div></div>';
}
function optHTML(handler, selected, main, sub, shape){
  return '<button class="opt'+(selected?' selected':'')+'" onclick="'+handler+'">' +
    '<span class="opt-dot '+shape+'"></span>' +
    '<span><span class="opt-main">'+main+'</span>'+(sub?'<span class="opt-sub">'+sub+'</span>':'')+'</span></button>';
}
function imagePreviewHTML(){
  var imgs=state.answers.images||[];
  if(imgs.length===0) return '';
  var h='';
  for(var i=0;i<imgs.length;i++){
    h+='<div class="image-item"><img src="'+imgs[i].data+'" alt="'+escapeHTML(imgs[i].name)+'"><button class="image-remove" onclick="event.stopPropagation(); removeImage('+i+')" aria-label="Remove image">×</button></div>';
  }
  return h;
}
function uploadHTML(){
  return '<div class="upload-zone" tabindex="0" onclick="document.getElementById(\'image-input\').click()" ' +
    'onpaste="onUploadPaste(event)" ondragover="event.preventDefault(); this.classList.add(\'dragging\')" ' +
    'ondragleave="this.classList.remove(\'dragging\')" ondrop="onUploadDrop(event)">' +
    '<div class="upload-title">'+bi('拖曳、貼上或點選上傳照片','Drag, paste, or choose photos')+'</div>' +
    '<div class="upload-note">'+bi('可放失效照片、零件近照、裝配狀態。送出前只在本頁預覽，按送出後才會上傳。','Add failure photos, part close-ups, or assembly state. Preview only until you submit.')+'</div>' +
    '<input id="image-input" class="upload-input" type="file" accept="image/*" multiple onchange="handleImageFiles(this.files); this.value=\'\'">' +
    '<div id="image-preview" class="image-preview">'+imagePreviewHTML()+'</div>' +
  '</div>';
}
function renderWizard(){
  var key=flow()[state.step]; var a=state.answers; var inner='';

  if(key==='intent'){
    var o='';
    for(var i=0;i<INTENT.length;i++){
      o+=optHTML('selectIntent('+i+')', a.intent===i, bi(INTENT[i].zh.t,INTENT[i].en.t), bi(INTENT[i].zh.d,INTENT[i].en.d), 'round');
    }
    inner='<div class="q-num">'+bi('第一步','Step 1')+'</div>' +
      '<h2 class="q-title">'+bi('你來找我們，主要是為了？','What brings you here, mainly?')+'</h2>' +
      '<p class="q-hint">'+bi('先選一個最接近的大方向，下一步再縮小範圍。','Pick the closest direction — we will narrow it down next.')+'</p>' +
      '<div class="options">'+o+'</div>';
  }
  else if(key==='sub'){
    var list=SUB[a.intent]||[]; var o2='';
    for(var j=0;j<list.length;j++){ o2+=optHTML('selectSub('+j+')', a.sub===j, bi(list[j].zh,list[j].en), '', 'round'); }
    inner='<h2 class="q-title">'+bi(SUB_TITLE[a.intent].zh,SUB_TITLE[a.intent].en)+'</h2>' +
      '<div class="options">'+o2+'</div>';
  }
  else if(key==='focus'){
    var f='';
    for(var k=0;k<FOCUS.length;k++){ f+=optHTML('toggleFocus('+k+')', a.focus.indexOf(k)>-1, bi(FOCUS[k].zh,FOCUS[k].en), '', 'square'); }
    var primary='<div id="primary-wrap" class="primary-wrap'+(a.focus.length===2?'':' is-hidden')+'">'+primaryHTML()+'</div>';
    var cont = '<button id="focus-next" class="next-btn'+(a.focus.length>0?'':' is-hidden')+'" onclick="onContinue()">'+bi('繼續 →','Continue →')+'</button>';
    inner='<h2 class="q-title">'+bi('你最擔心或最想釐清的是？','What worries you most, or most want to clarify?')+'</h2>' +
      '<p class="q-hint">'+bi('最多選 2 項；選「不確定」也可以。','Pick up to 2 — or choose "Not sure".')+'</p>' +
      '<div class="options">'+f+'</div>'+primary+cont;
  }
  else if(key==='data'){
    var d='';
    for(var m=0;m<DATA.length;m++){ d+=optHTML('toggleData('+m+')', a.data.indexOf(m)>-1, bi(DATA[m].zh,DATA[m].en), '', 'square'); }
    var hint = '<div id="data-hint" class="q4-hint'+(a.data.indexOf(12)>-1?'':' is-hidden')+'">'+bi('建議至少準備：產品整體照片、問題位置近照、使用或裝配狀態照片。','Suggested minimum: an overall product photo, a close-up of the problem area, and a photo of the use/assembly state.')+'</div>';
    var hasEvidence = a.data.length>0 || a.images.length>0;
    var cont2 = '<button id="data-next" class="next-btn'+(hasEvidence?'':' is-hidden')+'" onclick="onContinue()">'+bi('完成診斷 →','See my map →')+'</button>';
    inner='<h2 class="q-title">'+bi('你目前有哪些資料？','What materials do you have right now?')+'</h2>' +
      '<p class="q-hint">'+bi('可複選，選好後按完成診斷。','Select all that apply, then continue.')+'</p>' +
      '<div class="options">'+d+'</div>'+uploadHTML()+hint+cont2;
  }

  return '<div class="diag-card wizard-card"><div class="screen">' +
    '<button class="back-link" onclick="onBack()">'+bi('← 返回','← Back')+'</button>' +
    progHTML() + inner + '</div></div>';
}

/* =========================================================================
   畫面 3：專案地圖
   ========================================================================= */
function renderResults(){
  var a=state.answers; var part=isPart(); var score=readiness(); var risk=riskInfo();
  var rm=part?PART_RM:PRODUCT_RM; var last=rm.length-1;

  var cur;
  if(part){ cur = partCurrentStation(score); }
  else{
    if(a.intent===0){ cur=[1,2,3,4][a.sub!=null?a.sub:0]; } else { cur=0; }
    if(score>80) cur=Math.min(cur+1,last);
  }

  var tf=tfPair();
  var obBase = (a.intent===3)?OBSTACLE_DEFAULT
    : (a.sub!=null && OBSTACLE[a.intent] ? OBSTACLE[a.intent][a.sub] : {zh:'問題範圍還需要進一步釐清', en:'The scope still needs further clarification'});
  var obZh = obBase.zh + (tf?('，主要落在「'+tf.zh+'」這一類。'):'。');
  var obEn = obBase.en + (tf?(', mainly in the "'+tf.en+'" category.'):'.');

  var sug=recommendedGaps(part);
  var gapZh = sug.length?sug.map(function(r){return r.zh;}).join('、'):GAP_OK.zh;
  var gapEn = sug.length?sug.map(function(r){return r.en;}).join(', '):GAP_OK.en;

  var ns=helpByScore(score);

  var oneZh = part
    ? (tf?('你的重點偏向「'+tf.zh+'」這一類。下面這條是我們建議的健檢 / 改善路線，你目前停在第 '+(cur+1)+' 站。')
         :('你的問題範圍還需要再縮小一點。下面這條是我們建議的健檢路線，你目前停在第 '+(cur+1)+' 站。'))
    : ('你正處在產品開發路線的前段。下面是我們建議的開發階段，你目前停在第 '+(cur+1)+' 站。');
  var oneEn = part
    ? (tf?('Your focus leans toward "'+tf.en+'". Below is the health-check / improvement path we suggest — you are at station '+(cur+1)+'.')
         :('Your problem scope needs a bit more narrowing. Below is the health-check path we suggest — you are at station '+(cur+1)+'.'))
    : ('You are in the early part of the product-development path. Below are the stages we suggest — you are at station '+(cur+1)+'.');

  /* 車站列 */
  var stations='';
  for(var i=0;i<rm.length;i++){
    var st=rm[i]; var status=i<cur?'done':(i===cur?'current':'upcoming');
    var num=st[0].replace(/\D/g,'');
    var left = i===0?'empty':(i<=cur?'solid':'dash');
    var right= i===last?'empty':(i<cur?'solid':'dash');
    var tag='';
    if(status!=='upcoming'){
      tag = status==='done'
        ? '<span class="scard-tag cleared">'+bi('已釐清','Cleared')+'</span>'
        : '<span class="scard-tag here">'+bi('你在這站','You are here')+'</span>';
    }
    stations+='<div class="station">' +
      '<div class="station-top"><div class="seg '+left+'"></div><div class="badge '+status+'">'+num+'</div><div class="seg '+right+'"></div></div>' +
      '<div class="scard '+status+'"><div class="scard-code">'+st[0]+'</div><div class="scard-name">'+bi(st[1],st[2])+'</div>'+tag+'</div>' +
    '</div>';
  }

  var dt=new Date();
  var projectRef='HD-'+String(dt.getFullYear()).slice(2)+(dt.getMonth()+1<10?'0':'')+(dt.getMonth()+1);
  var titles=[ {zh:'產品開發專案',en:'Product Development'},{zh:'產品改造與優化專案',en:'Product Improvement'},
               {zh:'零件問題健檢專案',en:'Part Issue Health Check'},{zh:'產品方向釐清專案',en:'Direction Clarification'} ];
  var pt=titles[a.intent];
  var curLabel = {zh:st_name(rm[cur],'zh'), en:st_name(rm[cur],'en')};
  var pathLabel = part ? (a.intent===1?{zh:'你的改善路線',en:'Your improvement path'}:{zh:'你的健檢路線',en:'Your health-check path'})
                       : {zh:'你的開發路線',en:'Your development path'};

  return '<div class="diag-card wide result-card"><div class="screen">' +
    '<div class="map-head"><div class="map-eyebrow">'+bi('專屬開發地圖 · 為你生成','Your custom roadmap')+'</div><div class="map-ref">'+projectRef+'</div></div>' +
    '<h2 class="map-title">'+bi(pt.zh,pt.en)+'</h2>' +
    '<div class="strip">' +
      '<div class="strip-cell"><div class="strip-k">'+bi('目前位置','Current position')+'</div><div class="strip-v">'+bi(curLabel.zh,curLabel.en)+'</div></div>' +
      '<div class="strip-cell"><div class="strip-k">'+bi('資料完整度','Data readiness')+'</div><div class="strip-v">'+score+'%</div></div>' +
      '<div class="strip-cell"><div class="strip-k">'+bi('風險','Risk')+'</div><div class="strip-v" style="color:'+risk.c+'">'+bi(risk.zh,risk.en)+'</div></div>' +
    '</div>' +
    '<p class="map-oneliner">'+bi(oneZh,oneEn)+'</p>' +
    '<div class="path-label">'+bi(pathLabel.zh,pathLabel.en)+'</div>' +
    '<div class="station-scroll"><div class="station-row">'+stations+'</div></div>' +
    '<div class="detail">' +
      '<div class="detail-code"><span class="c">'+rm[cur][0]+'</span><span class="here">'+bi('你在這站','You are here')+'</span></div>' +
      '<div class="detail-name">'+bi(rm[cur][1],rm[cur][2])+'</div>' +
      '<div class="detail-grid">' +
        '<div class="box stuck"><div class="box-k">'+bi('你卡在這顆石頭','Where you are stuck')+'</div><div class="box-v">'+bi(obZh,obEn)+'</div></div>' +
        '<div class="box gap"><div class="box-k">'+bi('還缺什麼','What is missing')+'</div><div class="box-v">'+bi(gapZh,gapEn)+'</div></div>' +
      '</div>' +
      '<div class="help"><div class="help-k">'+bi('我們可以怎麼幫你','How we can help')+'</div>' +
        '<div class="help-v">'+bi(ns.help.zh,ns.help.en)+'</div>' +
        '<a class="btn-main" href="contact.html" onclick="if(typeof gtag===\'function\'){gtag(\'event\',\'contact_click\',{\'source\':\'diagnostic_result\'})}">'+bi(ns.cta.zh,ns.cta.en)+'</a>' +
      '</div>' +
    '</div>' +
    '<div class="r-divider"></div>' +
    '<div class="submit-panel">' +
      '<div class="submit-title">'+bi('送出診斷資料與照片','Submit diagnosis and photos')+'</div>' +
      '<div class="submit-note">'+bi('留下 Email 或 LINE，我會依照你的診斷結果與照片回覆。照片會上傳到 AustinDesign 的 Supabase 專案。','Leave an Email or LINE ID so I can reply based on your diagnosis and photos. Photos will be uploaded to AustinDesign Supabase.')+'</div>' +
      '<div class="form-grid">' +
        '<div class="field"><label for="contact-name">'+bi('姓名 / 公司','Name / company')+'</label><input id="contact-name" autocomplete="name"></div>' +
        '<div class="field"><label for="contact-email">Email</label><input id="contact-email" type="email" autocomplete="email"></div>' +
        '<div class="field"><label for="contact-line">LINE</label><input id="contact-line" autocomplete="off"></div>' +
      '</div>' +
      '<div class="field"><label for="user-note">'+bi('補充說明','Notes')+'</label><textarea id="user-note" placeholder="'+(pageBody.classList.contains('chinese-mode')?'例如：失效時間、使用環境、材料、批次、你希望我先看哪裡':'Failure timing, environment, material, batch, or what you want me to check first')+'"></textarea></div>' +
      '<button id="submit-diagnostic-btn" class="btn-main" style="margin-top:1rem;" onclick="submitDiagnostic()">'+bi('送出診斷資料','Submit diagnosis')+'</button>' +
      '<div id="submit-status" class="submit-status"></div>' +
    '</div>' +
    '<div class="r-divider"></div>' +
    '<p class="r-disclaimer">'+bi('這只是初步方向。完整評估需要進一步了解你的專案細節。','This is just an initial direction. A full assessment requires understanding more about your project.')+'</p>' +
    '<div class="r-cta">' +
      '<a href="projects.html" class="btn-sec">'+bi('先看看我做過的案子','See my past projects')+'</a>' +
      '<button class="btn-restart" onclick="restart()">'+bi('重新診斷','Start over')+'</button>' +
    '</div>' +
  '</div></div>';
}
function st_name(stRow, lang){ return lang==='zh'?(stRow[0].replace(/Stage |Issue /,'')+' · '+stRow[1]):(stRow[0]+' · '+stRow[2]); }

/* =========================================================================
   主渲染
   ========================================================================= */
function render(){
  var html;
  if(state.view==='landing') html=renderLanding();
  else if(state.view==='wizard') html=renderWizard();
  else html=renderResults();
  document.getElementById('app').innerHTML=html;
  window.scrollTo({top:0, left:0, behavior:'auto'});
}

/* 語言切換（沿用站台行為） */
var pageBody=document.body, langBtn=document.getElementById('lang-btn');
langBtn.addEventListener('click', function(){
  pageBody.classList.toggle('chinese-mode');
  langBtn.textContent = pageBody.classList.contains('chinese-mode') ? 'English' : '中文';
});

render();
</script>
</body>
</html>
